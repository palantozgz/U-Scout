<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Defensive System Builder ELITE</title>
<style>
:root{--b0:#05070a;--b1:#0c1018;--b2:#141a24;--bd:#2a3548;--tx:#eef2f8;--m:#8a96ab;--a:#4d8cff;--g:#2ee6a5;--r:#f87171;--rad:15px;--ff:system-ui,-apple-system,"Segoe UI",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ff);background:radial-gradient(110% 80% at 50% -15%,#121a28,var(--b0));color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 14px 22px;-webkit-tap-highlight-color:transparent}
#root{width:100%;max-width:600px;flex:1;display:flex;flex-direction:column;min-height:0}
header{text-align:center;padding:10px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:16px}
header h1{font-size:1rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
header .sub{font-size:.62rem;color:var(--m);margin-top:6px;letter-spacing:.14em}
.pwrap{margin-bottom:16px}
.pmeta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--m);margin-bottom:5px}
.ptrack{height:6px;background:var(--b2);border-radius:99px;border:1px solid var(--bd);overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--a),#7eb6ff);transition:width .3s ease}
main{flex:1;display:flex;flex-direction:column;min-height:0}
.q{font-size:1.04rem;font-weight:650;margin-bottom:6px;line-height:1.32}
.h{font-size:.78rem;color:var(--m);margin-bottom:16px;line-height:1.42}
main .h{margin-top:4px}
.opts{display:flex;flex-direction:column;gap:10px;flex:1}
.obtn{
  appearance:none;border:2px solid var(--bd);background:var(--b2);color:var(--tx);font:inherit;font-size:.98rem;font-weight:650;
  padding:16px 17px;border-radius:var(--rad);text-align:left;cursor:pointer;min-height:54px;display:flex;align-items:flex-start;gap:10px;
  transition:border-color .12s,background .12s,transform .06s;
}
.obtn:hover:not(:disabled){border-color:var(--a);background:#1a222e}
.obtn:active:not(:disabled){transform:scale(.996)}
.obtn:disabled{opacity:.34;cursor:not-allowed;border-style:dashed}
.obtn .d{display:block;font-size:.72rem;font-weight:400;color:var(--m);margin-top:5px;line-height:1.38}
.obtn .x{font-size:.69rem;color:var(--r);margin-top:7px;line-height:1.32;font-weight:500}
.nav{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd)}
.nb{font:inherit;font-size:.92rem;font-weight:650;padding:14px;border-radius:var(--rad);cursor:pointer;border:2px solid var(--bd);background:transparent;color:var(--m);min-height:50px;flex:1}
.nb.d{flex:0 0 auto;min-width:100px;color:var(--r);border-color:#3a2428}
.nb:hover:not(:disabled){background:var(--b2);color:var(--tx)}
.nb:disabled{opacity:.34;cursor:not-allowed}
.rep{background:var(--b1);border:1px solid var(--bd);border-radius:var(--rad);padding:18px;font-size:.85rem;line-height:1.52;max-height:min(56vh,500px);overflow-y:auto}
.rep h2{font-size:.98rem;color:var(--g);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.rep h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--m);margin:14px 0 6px}
.rep p{margin-bottom:8px}
.rep ul{margin:0 0 6px 16px}
.rep li{margin-bottom:4px}
.sn{font-size:1.12rem;font-weight:800;margin-bottom:10px;color:#fff}
.bad{background:#2a1518;border:1px solid #5c2a32;color:#fecaca;padding:12px;border-radius:var(--rad);font-size:.84rem;margin-bottom:12px;line-height:1.42}
.warn{background:#1a1f14;border:1px solid #4a5c32;color:#d9e8b8;padding:12px;border-radius:var(--rad);font-size:.78rem;margin-bottom:12px;line-height:1.45}
.export-actions{margin-top:14px}
.btn-ex{width:100%;font:inherit;font-size:.98rem;font-weight:750;padding:16px;border-radius:var(--rad);cursor:pointer;border:2px solid #2a4a78;background:linear-gradient(180deg,#1a3558,#122840);color:#e6f0ff;min-height:54px}
.btn-ex:hover:not(:disabled){filter:brightness(1.06)}
.btn-ex:disabled{opacity:.5;cursor:wait}
#export-host{position:fixed;left:-9999px;top:0;width:700px;pointer-events:none;z-index:0}
.ex-card{width:700px;background:#080c12;border:1px solid #243044;border-radius:18px;padding:32px 36px 36px;font-family:var(--ff);color:#dce4f0;-webkit-font-smoothing:antialiased}
.ex-card .br{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:#5c6b82;margin-bottom:12px}
.ex-card .ti{font-size:1.55rem;font-weight:800;color:#fff;line-height:1.15;margin-bottom:10px}
.ex-card .sec{margin-top:18px}
.ex-card .sec h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:#3dd4a8;margin-bottom:8px;font-weight:700}
.ex-card .sec .tx{font-size:.84rem;line-height:1.52;color:#b4c0d4}
.ex-card .sec ul{margin:0;padding-left:17px}
.ex-card .sec li{margin-bottom:5px;font-size:.84rem;line-height:1.42;color:#b4c0d4}
</style>
</head>
<body>
<div id="export-host"><div id="export-card" class="ex-card"></div></div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<script>
(function () {
  /** Causal order: identity → shell anchor + subtype → personnel → transition → rebounding. Help/rotations/paint are derived only. */
  var COV_SUBTYPE_OPTS = {
    drop: [
      { v: "deep", t: "Deep drop", d: "Big stays attached to roller; protect rim first." },
      { v: "high", t: "High drop", d: "Big higher; earlier touch on ballhandler." }
    ],
    hedge: [
      { v: "soft", t: "Soft hedge / show", d: "Brief touch; quick recover." },
      { v: "hard", t: "Hard hedge / show", d: "Longer show; more load on helpers." }
    ],
    switch: [
      { v: "flat", t: "Flat switch", d: "Exchange level; limit back-line exposure." },
      { v: "aggressive", t: "Aggressive switch", d: "Earlier exchange; more pressure on release." }
    ],
    blitz: [
      { v: "standard", t: "Standard blitz", d: "Classic two-to-the-ball trap look." },
      { v: "containTrap", t: "Contain trap", d: "Short-corner trap; contain first step then spring." }
    ]
  };

  var STEPS = [
    { id: "priority", q: "Defensive priority", h: "What you protect at all costs (identity).", opts: [
      { v: "rim", t: "Protect the rim", d: "Shrink paint; contest twos." },
      { v: "three", t: "Protect the 3", d: "High contests; nail help." },
      { v: "disrupt", t: "Disrupt the ball", d: "Pressure; gaps; turnovers." }
    ]},
    { id: "driveDirection", q: "Drive direction philosophy", h: "Forcing rules (identity).", opts: [
      { v: "noMiddle", t: "No middle", d: "Baseline / sideline walls." },
      { v: "forceMiddle", t: "Force middle", d: "Pack paint; tags." },
      { v: "funnel", t: "Funnel", d: "Channel to defined help pockets." }
    ]},
    { id: "onBall", q: "On-ball pressure", h: "Default ball pressure (identity).", opts: [
      { v: "contain", t: "Contain", d: "Gap; feet on floor; wall drives." },
      { v: "pressure", t: "Pressure", d: "Up touch; shrink clock; more risk." },
      { v: "turn", t: "Turn", d: "Force pick-up; deny rhythm; high foul discipline." }
    ]},
    { id: "pnrCoverage", q: "Pick-and-roll coverage (anchor)", h: "Determines help, rotations, and paint answers downstream.", opts: [
      { v: "drop", t: "Drop", d: "Contain two to the ball; low rotation volume." },
      { v: "switch", t: "Switch", d: "Exchange shell; stay square." },
      { v: "blitz", t: "Blitz", d: "Trap; early help; X-out chain." },
      { v: "hedge", t: "Hedge / show", d: "Touch time; tag roller; recover or rotate by load." }
    ]},
    { id: "coverageSubtype", q: "Coverage subtype", h: "Refines the anchor technique (staff vocabulary).", opts: [] },
    { id: "rimProtection", q: "Personnel — rim protection", h: "Big / back-line rim deterrence.", opts: [
      { v: "low", t: "Low", d: "Limited rim vertical or small lineups." },
      { v: "medium", t: "Medium", d: "Balanced rim presence." },
      { v: "high", t: "High", d: "Elite rim protection anchor." }
    ]},
    { id: "mobilityBig", q: "Personnel — big mobility", h: "Ability to show, recover, blitz.", opts: [
      { v: "low", t: "Low", d: "Stay home / drop biased." },
      { v: "high", t: "High", d: "Comfortable showing and recovering." }
    ]},
    { id: "switchability", q: "Personnel — switchability", h: "Positional size and switch tolerance.", opts: [
      { v: "low", t: "Low", d: "Traditional matchups; scram late." },
      { v: "medium", t: "Medium", d: "Selective switches." },
      { v: "high", t: "High", d: "Switch-heavy personnel." }
    ]},
    { id: "discipline", q: "Personnel — discipline", h: "Foul and scramble execution.", opts: [
      { v: "low", t: "Low", d: "Youth / volatile foul environment." },
      { v: "high", t: "High", d: "Veteran execution; situational scrams." }
    ]},
    { id: "transitionSafety", q: "Transition safety", h: "Getting back (philosophy).", opts: [
      { v: "oneBack", t: "1 back", d: "One safety." },
      { v: "twoBack", t: "2 back", d: "Double safety." },
      { v: "matchups", t: "Matchups", d: "No assigned safety." },
      { v: "tagUpTrans", t: "Tag Up", d: "Linked to Tag Up ORB." }
    ]},
    { id: "transitionPriority", q: "Transition priority", h: "Order in conversion (philosophy).", opts: [
      { v: "stopBall", t: "Stop ball", d: "Pick up early." },
      { v: "protectRim", t: "Protect rim", d: "Pack first." },
      { v: "wall", t: "Wall", d: "Channel; contain." }
    ]},
    { id: "reboundBalance", q: "Offensive rebounding", h: "Glass rules (philosophy).", opts: [
      { v: "crash", t: "Crash", d: "Maximum numbers." },
      { v: "balanced", t: "Balanced", d: "2–3 crashers." },
      { v: "safetyFirst", t: "Safety-first", d: "1–2 rarely crash." },
      { v: "tagUp", t: "Tag Up", d: "Five tag; matchup transition." }
    ]}
  ];

  var state = { a: {}, i: 0, h: [] };

  function A() { return state.a; }

  function tagUpOrb(x) {
    x = x || A();
    return x.reboundBalance === "tagUp";
  }

  function tagTransOk(x) {
    x = x || A();
    return x.transitionSafety === "tagUpTrans" || x.transitionSafety === "matchups";
  }

  function mergeAns(a, stepId, val) {
    var m = {};
    for (var k in a) m[k] = a[k];
    m[stepId] = val;
    return m;
  }

  /** Structural domain only (no tactical chain). Funnel + switch is allowed — see staff warnings in derivation output. */
  function domain(stepId, value, a) {
    return true;
  }

  function domainHint() {
    return null;
  }

  function subtypeValid(cov, sub) {
    var arr = COV_SUBTYPE_OPTS[cov];
    if (!arr || !sub) return false;
    return arr.some(function (x) { return x.v === sub; });
  }

  /**
   * Strict causal chain: pnrCoverage + subtype + context → helpStructure → helpTiming → helpIntensity → rotationModel → penetration → mismatchResponse → lowManTag → supporting.
   */
  var Derivation = (function () {
    function derive(inp) {
      var pr = inp.priority;
      var dd = inp.driveDirection;
      var ob = inp.onBall;
      var cov = inp.pnrCoverage;
      var sub = inp.coverageSubtype;
      var rimP = inp.rimProtection;
      var mob = inp.mobilityBig;
      var sw = inp.switchability;
      var disc = inp.discipline;
      var explanations = [];
      var warnings = [];

      if (dd === "funnel" && cov === "switch") {
        warnings.push(
          "Staff note: funnel channeling with a pure switch shell is non-standard — you trade classic funnel load-to-ball for matchup integrity; only staff with elite switch groups typically live here."
        );
      }

      var helpStructure = (function () {
        if (cov === "switch") return "none";
        if (cov === "drop") {
          if (dd === "noMiddle") return "weak";
          if (dd === "forceMiddle") return "strong";
          return "mixed";
        }
        if (cov === "blitz") {
          if (pr === "rim") return "weak";
          if (pr === "three") return "strong";
          return "mixed";
        }
        if (cov === "hedge") {
          if (sub === "soft") return pr === "rim" ? "weak" : "mixed";
          if (sub === "hard") {
            if (pr === "three") return "mixed";
            return "strong";
          }
        }
        return "mixed";
      })();
      explanations.push({
        key: "helpStructure",
        title: "Help structure",
        text:
          "Help structure is " +
          helpStructure +
          " because the shell anchor (" +
          cov +
          (sub ? ", " + sub : "") +
          ") with drive philosophy " +
          dd +
          " and priority " +
          pr +
          " fixes where low-man and nail help live before rotations trigger."
      });

      var helpTiming = cov === "drop" || cov === "switch" ? "late" : "early";
      explanations.push({
        key: "helpTiming",
        title: "Help timing",
        text: "Help timing is " + helpTiming + " because " + (cov === "drop" || cov === "switch" ? cov + " shells contain the ballhandler two-on-two first" : cov + " forces early commitment") + " — the anchor coverage, not preference, sets the clock on helpers."
      });

      var helpIntensity = (function () {
        if (cov === "switch") return "none";
        if (cov === "blitz") return "full";
        if (cov === "drop") return pr === "rim" ? "stunt" : "dig";
        if (cov === "hedge") {
          if (sub === "soft") return "stunt";
          if (pr === "disrupt" && disc === "high") return "full";
          return "dig";
        }
        return "stunt";
      })();
      explanations.push({
        key: "helpIntensity",
        title: "Help intensity",
        text: "Help intensity is " + helpIntensity + " because the shell anchor (" + cov + (sub ? "/" + sub : "") + ") plus " + pr + " priority " + (cov === "hedge" && sub === "hard" && pr === "disrupt" && disc === "high" ? "and high discipline " : "") + "sets how much off-ball load you can carry without breaking the chain."
      });

      var rotationModel = (function () {
        if (cov === "switch") return "switch";
        if (cov === "blitz") return "rotate";
        if (cov === "drop") {
          if (pr === "three") return "switch";
          if (dd === "noMiddle") return "conditional";
          return "recover";
        }
        if (cov === "hedge") {
          if (sub === "soft") return "recover";
          if (helpIntensity === "full") return "rotate";
          return "conditional";
        }
        return "recover";
      })();
      explanations.push({
        key: "rotationModel",
        title: "Rotation model",
        text: "Rotation model is " + rotationModel + " because " + cov + (sub ? " (" + sub + ")" : "") + " plus " + helpIntensity + " intensity forces whether you exchange, recover, live in conditional gaps, or X-out."
      });

      var penetration = (function () {
        if (cov === "blitz") return "help";
        if (cov === "switch") return "contain";
        if (cov === "drop") return "contain";
        if (cov === "hedge") {
          if (sub === "hard" && helpIntensity === "full") return "help";
          return "contain";
        }
        return "contain";
      })();
      explanations.push({
        key: "penetration",
        title: "Penetration response",
        text: penetration === "help"
          ? "Penetration response is HELP because the shell is already extended (trap or full-load hedge) — the next defender must meet ball level when the first line is broken."
          : cov === "drop"
            ? "Penetration response is CONTAIN with late help because DROP keeps the big between ball and rim two-on-two until the drive threatens the paint, then helpers trigger on the score line."
            : "Penetration response is CONTAIN first on hedge recover paths — you wall the drive out of the show, then sprint back to shooters unless the shell is fully loaded to help level."
      });

      var mismatchResponse = (function () {
        if (sw === "high") return "scram";
        if (disc === "high") return "situationalScram";
        return "accept";
      })();
      explanations.push({
        key: "mismatchResponse",
        title: "Mismatch response",
        text: "Mismatch cleanup is " + mismatchResponse + " because switchability " + sw + (disc === "high" ? " and discipline high" : "") + " forces how aggressively you re-match after exchanges."
      });

      var lowManTag = (function () {
        if (cov === "blitz") return "always";
        if (cov === "hedge") return sub === "hard" ? "always" : "conditional";
        if (cov === "drop") return "conditional";
        if (cov === "switch") return "none";
        return "conditional";
      })();
      explanations.push({
        key: "lowManTag",
        title: "Low man / roller tag",
        text: "Roller tag is " + lowManTag + " because " + cov + (sub ? " (" + sub + ")" : "") + " defines whether the roller must be tagged every time or only when the shell is loaded."
      });

      var earlyScreen = ob === "pressure" || ob === "turn" ? "switch" : "contain";
      explanations.push({
        key: "earlyScreen",
        title: "Early defense",
        text: "Early defense is " + earlyScreen + " because " + (ob === "contain" ? "contain posture" : "pressure/turn posture") + " forces whether you flat contain empty-side drags or exchange early to disrupt rhythm picks."
      });

      var sidePnRRule = cov === "switch" ? "switch" : "standard";
      var middlePnRRule = pr === "disrupt" ? "weak" : "standard";
      var offBallPosition = mob === "high" ? "gap" : "gap";
      var kypDenyMode = pr === "three" ? "shooters" : "shooters";
      var kypHelpOff = "yes";
      var kypStuntUsage = cov === "hedge" ? "always" : "situational";
      var postDefense = rimP === "high" ? "onev1" : "onev1";
      var closeouts = pr === "three" ? "controlled" : "aggressive";

      var tactics = {
        priority: pr,
        driveDirection: dd,
        onBall: ob,
        pnrCoverage: cov,
        coverageSubtype: sub,
        rimProtection: rimP,
        mobilityBig: mob,
        switchability: sw,
        discipline: disc,
        transitionSafety: inp.transitionSafety,
        transitionPriority: inp.transitionPriority,
        reboundBalance: inp.reboundBalance,
        helpStructure: helpStructure,
        helpTiming: helpTiming,
        helpIntensity: helpIntensity,
        rotationModel: rotationModel,
        penetration: penetration,
        mismatchResponse: mismatchResponse,
        lowManTag: lowManTag,
        sidePnRRule: sidePnRRule,
        middlePnRRule: middlePnRRule,
        offBallPosition: offBallPosition,
        kypDenyMode: kypDenyMode,
        kypHelpOff: kypHelpOff,
        kypStuntUsage: kypStuntUsage,
        postDefense: postDefense,
        closeouts: closeouts,
        earlyScreen: earlyScreen
      };

      return { tactics: tactics, explanations: explanations, warnings: warnings };
    }

    function assertInvariants(t) {
      if (t.pnrCoverage === "switch") {
        if (t.helpStructure !== "none" || t.helpTiming !== "late") return false;
      }
      if (t.pnrCoverage === "blitz") {
        if (t.helpTiming !== "early" || t.rotationModel !== "rotate" || t.penetration !== "help") return false;
      }
      if (t.pnrCoverage === "drop" && t.rotationModel === "rotate") return false;
      if (t.pnrCoverage === "hedge") {
        if (t.helpTiming !== "early" || t.lowManTag === "none") return false;
      }
      return true;
    }

    function full(userAnswers) {
      return derive(userAnswers);
    }

    return { derive: derive, full: full, assertInvariants: assertInvariants };
  })();

  function edgeViolations(t) {
    var e = [];
    if (tagUpOrb(t) && !tagTransOk(t)) e.push("Tag Up ORB requires Tag Up transition or matchup conversion.");
    if (t.transitionSafety === "tagUpTrans" && t.reboundBalance !== "tagUp")
      e.push("Tag Up transition requires Tag Up rebounding.");
    if (t.reboundBalance === "safetyFirst" && (tagUpOrb(t) || t.transitionSafety === "tagUpTrans"))
      e.push("Tag Up rules conflict with safety-first crashing.");
    return e;
  }

  var Logic = {};

  Logic.reason = function (stepId, value) {
    var a = A();
    if (!domain(stepId, value, a)) return domainHint();
    if (stepId === "coverageSubtype") {
      if (!a.pnrCoverage) return "Pick shell coverage first.";
      if (!subtypeValid(a.pnrCoverage, value)) return "This subtype does not match the selected shell.";
    }
    return null;
  };

  Logic.validate = function () {
    var a = A();
    var ids = STEPS.map(function (s) { return s.id; });
    for (var i = 0; i < ids.length; i++) {
      if (!a[ids[i]]) return ["Incomplete."];
    }
    var pack = Derivation.full(a);
    if (!Derivation.assertInvariants(pack.tactics)) return ["Internal derivation error — please restart."];
    var e = edgeViolations(pack.tactics);
    var seen = {};
    return e.filter(function (x) {
      if (seen[x]) return false;
      seen[x] = true;
      return true;
    });
  };

  function lbl(a, id) {
    var s = STEPS.find(function (z) { return z.id === id; });
    if (!s) return "";
    var o = s.opts.find(function (z) { return z.v === a[id]; });
    return o ? o.t : "";
  }

  function lblSubtype(a) {
    var arr = COV_SUBTYPE_OPTS[a.pnrCoverage] || [];
    var o = arr.find(function (x) { return x.v === a.coverageSubtype; });
    return o ? o.t : (a.coverageSubtype || "");
  }

  var DERIVED_LABELS = {
    rimProtection: { low: "Rim protection: low", medium: "Rim protection: medium", high: "Rim protection: high" },
    mobilityBig: { low: "Big mobility: low", high: "Big mobility: high" },
    switchability: { low: "Switchability: low", medium: "Switchability: medium", high: "Switchability: high" },
    discipline: { low: "Discipline: low", high: "Discipline: high" },
    helpStructure: { weak: "Weak-side", strong: "Strong-side", mixed: "Mixed", none: "Minimal (switch skeleton)" },
    helpTiming: { early: "Early", late: "Late" },
    helpIntensity: { none: "None", stunt: "Stunt", dig: "Dig", full: "Full" },
    rotationModel: { none: "None", recover: "Recover", conditional: "Conditional", rotate: "Rotation (X-out)", switch: "Switch", peel: "Peel" },
    penetration: { contain: "Contain", help: "Help", peel: "Peel" },
    mismatchResponse: { accept: "Accept", scram: "Scram", situationalScram: "Situational scram", frontHelp: "Front + help", doubleMismatch: "Double", forcedReswitch: "Forced reswitch" },
    sidePnRRule: { standard: "Standard", switch: "Switch", ice: "ICE" },
    middlePnRRule: { weak: "WEAK", standard: "Standard", switch: "Switch" },
    lowManTag: { always: "Always tag", conditional: "Conditional tag", none: "None" },
    postDefense: { onev1: "1v1", dig: "Dig", double: "Double" },
    offBallPosition: { gap: "Gap", deny: "Deny", attached: "Attached" },
    kypDenyMode: { shooters: "Deny shooters", all: "Deny all" },
    kypHelpOff: { yes: "Help off yes", no: "Help off no" },
    kypStuntUsage: { always: "Always", situational: "Situational" },
    closeouts: { aggressive: "Aggressive", controlled: "Controlled" },
    earlyScreen: { switch: "Switch", contain: "Contain", softShow: "Soft show", under: "Under" }
  };

  function tlabel(t, id) {
    if (id === "coverageSubtype") return lblSubtype(t);
    var L = DERIVED_LABELS[id];
    if (L && t[id] != null && L[t[id]]) return L[t[id]];
    return lbl(t, id);
  }

  var Report = {
    name: function (userA) {
      var t = Derivation.full(userA).tactics;
      var p = [];
      if (tagUpOrb(t)) p.push("Tag Up");
      if (t.middlePnRRule === "weak") p.push("WEAK");
      if (t.pnrCoverage === "drop") p.push("Drop");
      else if (t.pnrCoverage === "switch") p.push("Switch");
      else if (t.pnrCoverage === "blitz") p.push("Blitz");
      else p.push("Hedge");
      return (p.length ? p.join(" · ") : "Elite") + " System";
    },
    build: function (userA) {
      var pack = Derivation.full(userA);
      var t = pack.tactics;
      var causal = pack.explanations.map(function (x) {
        return x.title + " — " + x.text;
      });

      var id = "";
      if (t.priority === "rim") id = "Rim-first identity. ";
      else if (t.priority === "three") id = "Three-point protection identity. ";
      else id = "Disruptive ball-pressure identity. ";
      id += t.driveDirection === "noMiddle" ? "No-middle drive rules. " : t.driveDirection === "forceMiddle" ? "Force-middle pack rules. " : "Funnel channel rules. ";
      id += "On-ball: " + lbl(userA, "onBall") + ". ";
      id +=
        "Personnel: " +
        tlabel(t, "rimProtection") +
        " · " +
        tlabel(t, "mobilityBig") +
        " · " +
        tlabel(t, "switchability") +
        " · " +
        tlabel(t, "discipline") +
        ".";

      var ball = [];
      ball.push("Side / middle alignment (derived from anchor): " + tlabel(t, "sidePnRRule") + " · " + tlabel(t, "middlePnRRule") + ".");
      ball.push("Shell anchor (your input): " + lbl(userA, "pnrCoverage") + " · " + lblSubtype(userA) + ".");

      var half = [];
      half.push(
        "Derived pack: help " + tlabel(t, "helpStructure") + ", " + tlabel(t, "helpTiming") + " timing, " + tlabel(t, "helpIntensity") + " intensity · " +
        tlabel(t, "rotationModel") + " · paint " + tlabel(t, "penetration") + " · mismatch " + tlabel(t, "mismatchResponse") + " · roller " + tlabel(t, "lowManTag") + "."
      );
      half.push("Off-ball (supporting default): " + tlabel(t, "offBallPosition") + " · KYP deny " + tlabel(t, "kypDenyMode") + ", help off " + tlabel(t, "kypHelpOff") + ", stunts " + tlabel(t, "kypStuntUsage") + ".");
      half.push("Post / closeout defaults: " + tlabel(t, "postDefense") + " · " + tlabel(t, "closeouts") + " closeouts.");

      var tr = [];
      tr.push(lbl(userA, "transitionSafety") + " · " + lbl(userA, "transitionPriority") + ".");
      if (tagUpOrb(t)) tr.push("Tag Up ORB: five contact tags, between man and basket, matchup transition — overrides fixed safety roles.");
      else if (t.transitionSafety === "oneBack") tr.push("One safety to rim; release vs crash scripted.");
      else if (t.transitionSafety === "twoBack") tr.push("Two safeties: ball then rim.");
      else tr.push("Matchup conversion; no assigned safety.");

      var rb = [];
      if (tagUpOrb(t)) rb.push("Maximum ORB with Tag Up rules; long-miss mismatch risk.");
      else if (t.reboundBalance === "crash") rb.push("Crash when transition allows numbers.");
      else if (t.reboundBalance === "balanced") rb.push("Balanced 2–3 crashers.");
      else rb.push("Safety-first release.");

      var er = [];
      er.push(
        t.earlyScreen === "switch"
          ? "Early drags: switch exchanges before the shell is fully loaded (derived from on-ball pressure)."
          : "Early drags: contain flat until the shell is set (derived from on-ball posture)."
      );

      var st = [], wk = [], us = [];
      if (tagUpOrb(t)) {
        st.push("ORB volume without classic safety.");
        wk.push("Tag fouls and transition mismatches.");
      }
      if (t.transitionSafety === "twoBack") st.push("Floor vs runners.");
      if (!st.length) st.push("Teachable layers for staff and players.");
      if (t.helpStructure === "none") wk.push("Switch skeleton: elite isolation vs set matchups.");
      if (t.rotationModel === "rotate") wk.push("Corner skip stress under X-out pressure.");
      if (wk.length < 2) wk.push("Personnel and shot quality still test shell clarity.");
      if (t.priority === "three") us.push("vs shooting.");
      if (t.transitionPriority === "stopBall") us.push("vs transition.");
      if (t.pnrCoverage === "switch") us.push("vs spread PnR.");
      if (us.length < 3) us.push("vs balanced: clarity wins.");

      return {
        name: Report.name(userA),
        identity: id,
        ball: ball,
        half: half,
        causal: causal,
        warnings: pack.warnings || [],
        trans: tr,
        reb: rb,
        early: er,
        st: st,
        wk: wk,
        us: us
      };
    }
  };

  function el(tag, props, kids) {
    var n = document.createElement(tag);
    if (props) for (var k in props) {
      if (k === "className") n.className = props[k];
      else if (k === "text") n.textContent = props[k];
      else if (k === "disabled") n.disabled = !!props[k];
      else if (k.slice(0, 2) === "on" && typeof props[k] === "function") n.addEventListener(k.slice(2).toLowerCase(), props[k]);
      else n.setAttribute(k, props[k]);
    }
    (kids || []).forEach(function (c) {
      if (typeof c === "string") n.appendChild(document.createTextNode(c));
      else if (c) n.appendChild(c);
    });
    return n;
  }

  function exSec(title, lines, list) {
    var d = el("div", { className: "sec" });
    d.appendChild(el("h4", { text: title }));
    if (list) {
      var u = el("ul", {}, []);
      lines.forEach(function (t) { u.appendChild(el("li", { text: t })); });
      d.appendChild(u);
    } else {
      d.appendChild(el("div", { className: "tx", text: lines.join(" ") }));
    }
    return d;
  }

  var Export = {
    fill: function (r) {
      var c = document.getElementById("export-card");
      c.textContent = "";
      c.appendChild(el("div", { className: "br", text: "Defensive System Builder · ELITE" }));
      c.appendChild(el("div", { className: "ti", text: r.name }));
      c.appendChild(exSec("Defensive identity", [r.identity], false));
      if (r.warnings && r.warnings.length) c.appendChild(exSec("Staff warnings", r.warnings, true));
      c.appendChild(exSec("Ball screen rules", r.ball, true));
      c.appendChild(exSec("Half-court rules", r.half, true));
      c.appendChild(exSec("Causal chain (derived)", r.causal, true));
      c.appendChild(exSec("Transition plan", r.trans, true));
      c.appendChild(exSec("Rebound plan", r.reb, true));
      c.appendChild(exSec("Early defense", r.early, false));
      c.appendChild(exSec("Strengths", r.st, true));
      c.appendChild(exSec("Weaknesses", r.wk, true));
      c.appendChild(exSec("Ideal use", r.us, true));
    },
    png: function () {
      var btn = document.getElementById("dl-png");
      if (!btn || typeof html2canvas !== "function") return;
      btn.disabled = true;
      btn.textContent = "Generating…";
      var card = document.getElementById("export-card");
      html2canvas(card, { scale: 2, backgroundColor: "#080c12", useCORS: true, logging: false }).then(function (cv) {
        var u = cv.toDataURL("image/png");
        var a = document.createElement("a");
        a.href = u;
        a.download = "defensive-system-elite.png";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        btn.disabled = false;
        btn.textContent = "Download as Image";
      }).catch(function () {
        btn.disabled = false;
        btn.textContent = "Download as Image";
      });
    }
  };

  var UI = {
    go: function () {
      var root = document.getElementById("root");
      root.textContent = "";
      var N = STEPS.length;
      var idx = state.i;
      var done = idx >= N;
      var pct = done ? 100 : Math.round((idx + 1) / N * 100);
      root.appendChild(el("header", {}, [
        el("h1", { text: "Defensive System Builder" }),
        el("p", { className: "sub", text: "ELITE" })
      ]));
      root.appendChild(el("div", { className: "pwrap" }, [
        el("div", { className: "pmeta" }, [
          el("span", { text: done ? "Complete" : "Step " + (idx + 1) + " / " + N }),
          el("span", { text: pct + "%" })
        ]),
        el("div", { className: "ptrack" }, [el("div", { className: "pfill", style: "width:" + pct + "%" })])
      ]));
      if (done) {
        var err = Logic.validate();
        var main = el("main", {});
        if (err.length) {
          main.appendChild(el("div", { className: "bad", text: err[0] }));
          main.appendChild(el("p", { className: "h", text: "Use Back to fix conflicts." }));
        } else {
          var r = Report.build(A());
          Export.fill(r);
          main.appendChild(el("div", { className: "sn", text: r.name }));
          var repKids = [
            el("h2", { text: "Defensive identity" }),
            el("p", { text: r.identity })
          ];
          if (r.warnings && r.warnings.length) repKids.push(el("div", { className: "warn", text: r.warnings.join(" ") }));
          repKids.push(
            el("h3", { text: "Ball screen rules" }),
            el("ul", {}, r.ball.map(function (t) { return el("li", { text: t }); })),
            el("h3", { text: "Half-court rules" }),
            el("ul", {}, r.half.map(function (t) { return el("li", { text: t }); })),
            el("h3", { text: "Why these choices (causal)" }),
            el("ul", {}, r.causal.map(function (t) { return el("li", { text: t }); })),
            el("h3", { text: "Transition plan" }),
            el("ul", {}, r.trans.map(function (t) { return el("li", { text: t }); })),
            el("h3", { text: "Rebound plan" }),
            el("ul", {}, r.reb.map(function (t) { return el("li", { text: t }); })),
            el("h3", { text: "Early defense" }),
            el("p", { text: r.early.join(" ") }),
            el("h3", { text: "Strengths" }),
            el("ul", {}, r.st.map(function (t) { return el("li", { text: t }); })),
            el("h3", { text: "Weaknesses" }),
            el("ul", {}, r.wk.map(function (t) { return el("li", { text: t }); })),
            el("h3", { text: "Ideal use" }),
            el("ul", {}, r.us.map(function (t) { return el("li", { text: t }); }))
          );
          main.appendChild(el("div", { className: "rep" }, repKids));
          main.appendChild(el("div", { className: "export-actions" }, [
            el("button", { type: "button", className: "btn-ex", id: "dl-png", text: "Download as Image", onclick: function () { Export.png(); } })
          ]));
        }
        root.appendChild(main);
        root.appendChild(el("div", { className: "nav" }, [
          el("button", { type: "button", className: "nb", text: "Back", disabled: state.h.length === 0, onclick: Nav.back }),
          el("button", { type: "button", className: "nb d", text: "Restart", onclick: Nav.restart })
        ]));
        return;
      }
      var st = STEPS[idx];
      var main = el("main", {}, [
        el("div", { className: "q", text: st.q }),
        el("div", { className: "h", text: st.h })
      ]);
      if (st.id === "coverageSubtype" && !A().pnrCoverage) {
        main.appendChild(el("div", { className: "bad", text: "Pick shell coverage on the previous step first." }));
      }
      var box = el("div", { className: "opts" });
      var opts = st.id === "coverageSubtype" ? COV_SUBTYPE_OPTS[A().pnrCoverage] || [] : st.opts;
      opts.forEach(function (o) {
        var msg = Logic.reason(st.id, o.v);
        var L = el("div", {}, []);
        L.appendChild(el("div", {}, [document.createTextNode(o.t)]));
        if (o.d) L.appendChild(el("span", { className: "d", text: o.d }));
        if (msg) L.appendChild(el("div", { className: "x", text: msg }));
        box.appendChild(el("button", { type: "button", className: "obtn", disabled: !!msg, onclick: function () { Nav.pick(st.id, o.v); } }, [L]));
      });
      main.appendChild(box);
      root.appendChild(main);
      root.appendChild(el("div", { className: "nav" }, [
        el("button", { type: "button", className: "nb", text: "Back", disabled: state.h.length === 0, onclick: Nav.back }),
        el("button", { type: "button", className: "nb d", text: "Restart", onclick: Nav.restart })
      ]));
    }
  };

  var Nav = {
    pick: function (id, v) {
      state.h.push({ i: state.i, a: JSON.parse(JSON.stringify(state.a)) });
      state.a[id] = v;
      state.i++;
      if (state.i > STEPS.length) state.i = STEPS.length;
      UI.go();
    },
    back: function () {
      if (!state.h.length) return;
      var s = state.h.pop();
      state.i = s.i;
      state.a = s.a;
      UI.go();
    },
    restart: function () {
      state.a = {};
      state.i = 0;
      state.h = [];
      UI.go();
    }
  };

  UI.go();
})();
</script>
</body>
</html>
