<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Defensive System Builder ELITE</title>
<style>
:root {
  --bg0:#0a0c10;
  --bg1:#12161e;
  --bg2:#1a2029;
  --border:#2a3344;
  --text:#e8ecf1;
  --muted:#8b96a8;
  --accent:#3d8bfd;
  --accent2:#22c55e;
  --danger:#ef4444;
  --warn:#f59e0b;
  --radius:14px;
  --font: "Segoe UI", system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 45%, #0d1117 100%);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
}
#app {
  width: 100%;
  max-width: 560px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
header {
  text-align: center;
  padding: 12px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
header h1 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text);
}
header .sub {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.12em;
}
.progress-wrap {
  margin-bottom: 20px;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 8px;
}
.progress-bar {
  height: 6px;
  background: var(--bg2);
  border-radius: 99px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #60a5fa);
  border-radius: 99px;
  transition: width 0.35s ease;
}
main {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.screen-title {
  font-size: 1.05rem;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.35;
}
.screen-hint {
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.45;
}
.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
}
.btn-option {
  appearance: none;
  border: 2px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 18px 20px;
  border-radius: var(--radius);
  text-align: left;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.btn-option span.desc {
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--muted);
  display: block;
  margin-top: 4px;
}
.btn-option:hover:not(:disabled) {
  border-color: var(--accent);
  background: #1f2733;
}
.btn-option:active:not(:disabled) { transform: scale(0.99); }
.btn-option:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  border-style: dashed;
}
.btn-option .reason {
  font-size: 0.72rem;
  font-weight: 500;
  color: #f87171;
  margin-top: 8px;
  line-height: 1.35;
}
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.btn-ghost, .btn-danger {
  flex: 1;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  padding: 16px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--muted);
  min-height: 52px;
}
.btn-danger {
  flex: 0 0 auto;
  min-width: 100px;
  color: var(--danger);
  border-color: #3f2024;
}
.btn-ghost:hover:not(:disabled), .btn-danger:hover:not(:disabled) {
  background: var(--bg2);
  color: var(--text);
}
.btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }
.report {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  font-size: 0.88rem;
  line-height: 1.55;
  max-height: min(62vh, 520px);
  overflow-y: auto;
}
.report h2 {
  font-size: 1.1rem;
  margin-bottom: 12px;
  color: var(--accent2);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}
.report h3 {
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin: 18px 0 8px;
}
.report p { margin-bottom: 10px; }
.report ul { margin: 0 0 10px 18px; }
.report li { margin-bottom: 6px; }
.system-name {
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: 0.02em;
  margin-bottom: 14px;
  color: #fff;
}
.block-banner {
  background: #2a1518;
  border: 1px solid #5c2a32;
  color: #fecaca;
  padding: 14px 16px;
  border-radius: var(--radius);
  font-size: 0.88rem;
  margin-bottom: 16px;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  var STEPS = [
    { id: "priority", label: "Defensive priority", hint: "What are you willing to concede least often?", options: [
      { value: "rim", label: "Protect the rim", desc: "Shrink the paint; contest twos; live with some threes." },
      { value: "three", label: "Protect the 3", desc: "High closeouts; help from nail; rim can be thinner." },
      { value: "disrupt", label: "Disrupt the ball", desc: "Pressure, gaps, turnovers; higher risk behind the ball." }
    ]},
    { id: "driveDirection", label: "Drive direction", hint: "Where do you force primary drivers?", options: [
      { value: "noMiddle", label: "No middle", desc: "Baseline / sideline pushes; wall the lane-line." },
      { value: "forceMiddle", label: "Force middle", desc: "Pack-line feel; big helps from tag; rim protection central." }
    ]},
    { id: "helpStructure", label: "Half-court help structure", hint: "Where does your help originate most often?", options: [
      { value: "weak", label: "Weak-side", desc: "I help from low man / dunker; strong side stays home more." },
      { value: "strong", label: "Strong-side", desc: "Loaded ball-side gaps; early stunts from nail / elbow." },
      { value: "mixed", label: "Mixed", desc: "Matchups and game plan dictate weak vs strong tags." },
      { value: "none", label: "None (stay home)", desc: "Minimal help; iso answers; switch-heavy skeleton." }
    ]},
    { id: "helpTiming", label: "Help timing", hint: "When do helpers commit relative to the drive?", options: [
      { value: "early", label: "Early", desc: "Show hands on the catch; stunt on the first dribble." },
      { value: "late", label: "Late", desc: "Stay home until the drive threatens the paint / score." }
    ]},
    { id: "pnrCoverage", label: "Pick & roll coverage", hint: "Default ball-screen answer in the half court.", options: [
      { value: "drop", label: "Drop", desc: "Big contains; guards get over; conservative." },
      { value: "switch", label: "Switch", desc: "Exchange; scram switch mismatches you cannot keep." },
      { value: "blitz", label: "Blitz (trap)", desc: "Two to the ball; rotations must be true." },
      { value: "hedge", label: "Hedge / show", desc: "Big up to touch time; recover to roller." }
    ]},
    { id: "rotationModel", label: "Rotation model", hint: "When the ball beats the first line, what is the rule?", options: [
      { value: "recover", label: "Recover", desc: "Stunt and get back; keep matchups when possible." },
      { value: "rotate", label: "Rotate", desc: "Full chain: one more pass away is live." },
      { value: "switch", label: "Switch", desc: "Exchange matchups to kill advantage; scramble after." },
      { value: "peel", label: "Peel", desc: "Helper peels off shooter to tag roller / nail." }
    ]},
    { id: "penetration", label: "Penetration response", hint: "When the ball gets into the paint off the bounce.", options: [
      { value: "contain", label: "Contain", desc: "Wall up; no fly-bys; contest without fouling." },
      { value: "help", label: "Help", desc: "Helpers step to ball level; kick-outs are contested by rotation." },
      { value: "peel", label: "Peel", desc: "Closest help peels from shooter to tag driver / roller." }
    ]},
    { id: "postDefense", label: "Post defense", hint: "Rules vs deep catches on the block.", options: [
      { value: "onev1", label: "1v1", desc: "Stay between; no automatic doubles." },
      { value: "dig", label: "Dig", desc: "Guards hit pockets on dribbles; big stays primary." },
      { value: "double", label: "Double", desc: "Send a second defender on the catch or first move." }
    ]},
    { id: "mismatch", label: "Mismatch rules", hint: "When a switch creates a bad matchup.", options: [
      { value: "accept", label: "Accept", desc: "Live with it; load help without automatic exchange." },
      { value: "scram", label: "Scram", desc: "Re-switch, peel, or late switch to clean the matchup." }
    ]},
    { id: "closeouts", label: "Closeout style", hint: "Default technique on skip / drive-kick.", options: [
      { value: "aggressive", label: "Aggressive", desc: "Long closeouts; fly-by risk; run shooters off." },
      { value: "controlled", label: "Controlled", desc: "Short contest; gap reads; fewer blow-bys." }
    ]},
    { id: "transitionSafety", label: "Transition safety structure", hint: "How many players prioritize getting back vs crashing?", options: [
      { value: "oneBack", label: "1 back", desc: "One safety; others release or conditional crash." },
      { value: "twoBack", label: "2 back", desc: "Double safety; balanced floor on misses." },
      { value: "fullCrash", label: "Full crash", desc: "Everyone hits glass first; extreme risk reward." }
    ]},
    { id: "transitionStopBall", label: "Stop ball priority (transition)", hint: "Order of operations when the ball advances in transition.", options: [
      { value: "earlyStop", label: "Early stop", desc: "Pick up full court; slow the ball above the arc." },
      { value: "contain", label: "Contain", desc: "Channel to help; protect rim with length." },
      { value: "protectRim", label: "Protect rim first", desc: "Sprint to pack paint; late show at three." }
    ]},
    { id: "reboundBalance", label: "Offensive rebounding system", hint: "Must align with who gets back in transition.", options: [
      { value: "crash", label: "Crash (4–5)", desc: "Send everyone possible; second shots over safety." },
      { value: "balanced", label: "Balanced (2–3 crash)", desc: "Designated crashers; defined release rules." },
      { value: "safetyFirst", label: "Safety priority (1–2 always back)", desc: "Guards or designated safeties never crash." }
    ]},
    { id: "earlyScreen", label: "Early offense / early drag screen", hint: "Before your half-court help shell is set.", options: [
      { value: "switch", label: "Switch", desc: "Exchange immediately; organize scrambles after stop." },
      { value: "contain", label: "Contain (no hedge)", desc: "Guard fights over/under; big flat or short step." },
      { value: "softShow", label: "Soft show", desc: "Brief touch on ball-handler; recover to roller." },
      { value: "noCoverage", label: "No coverage (protect paint)", desc: "Go under / through; center protects rim first." }
    ]}
  ];

  var state = {
    answers: {},
    stepIndex: 0,
    history: [],
    blockedReason: null
  };

  function hasHelpState(ans) {
    return !!(ans && ans.helpStructure && ans.helpStructure !== "none");
  }

  function blitzAllowed(a) {
    return hasHelpState(a) && (a.helpTiming === "early" || a.priority === "disrupt");
  }

  function LogicEngine() {}

  LogicEngine.prototype.optionDisabledReason = function (stepId, value) {
    var a = state.answers;
    if (stepId === "helpTiming") {
      if (value === "early" && a.pnrCoverage === "switch") return "Switch coverage needs late help tags.";
      if (value === "early" && a.rotationModel === "peel") return "Peel base rotations conflict with early help complexity.";
      if (value === "early" && a.pnrCoverage === "drop") return "Drop coverage is built on late help triggers.";
    }
    if (stepId === "helpStructure") {
      if (value === "strong" && a.pnrCoverage === "switch") return "Cannot pair strong-side help with switch coverage.";
      if (value === "none" && a.postDefense === "double") return "Double post requires a live help structure.";
    }
    if (stepId === "pnrCoverage") {
      if (value === "switch" && a.helpStructure === "strong") return "Strong-side help with switch coverage is incoherent.";
      if ((value === "blitz" || value === "hedge") && !hasHelpState(a)) return "No tag structure: cannot run hedge or blitz as default.";
      if (value === "blitz" && !blitzAllowed(a)) return "Blitz requires early committed help tags or a disrupt-first identity.";
      if (value === "hedge" && hasHelpState(a) && !(a.helpTiming === "early" || a.priority === "disrupt")) return "Hedge/show needs early tags or disrupt identity to protect the big.";
      if (value === "switch" && a.helpTiming === "early") return "Switch coverage forces late help commitment.";
      if (value === "drop" && a.helpTiming === "early") return "Drop is a late-trigger coverage; early help breaks the contain.";
      if (value === "switch" && a.mismatch === "accept") return "Switch systems need scram rules to clean bad matchups.";
    }
    if (stepId === "rotationModel") {
      if (value === "recover" && a.penetration === "peel") return "Peel penetration needs a peel rotation rule.";
      if (value === "rotate" && a.penetration === "peel") return "Heavy rotation chains clash with peel rules.";
      if (value === "switch" && a.helpStructure === "none") return "No help shell requires switch-based answers at the second line.";
      if (value !== "switch" && a.helpStructure === "none") return "Without help, you cannot run recover/rotate/peel as primary.";
      if (value === "peel" && a.helpTiming === "early") return "Early help increases long rotations; peel is a reduced-chain model.";
      if (value !== "peel" && a.penetration === "peel") return "Penetration peel requires peel as the rotation model.";
      if (value === "rotate" && a.pnrCoverage === "drop") return "Drop coverage asks for lower rotation volume than a full rotate system.";
    }
    if (stepId === "penetration") {
      if (value === "peel" && a.helpTiming === "early") return "Peel rules need late help discipline.";
      if (value === "peel" && a.rotationModel !== "peel") return "Peel penetration requires peel rotation model.";
      if (value !== "peel" && a.rotationModel === "peel") return "Peel rotation model requires peel penetration response.";
    }
    if (stepId === "postDefense") {
      if (value === "double" && a.helpStructure === "none") return "Doubling the post requires a live help structure.";
    }
    if (stepId === "mismatch") {
      if (value === "accept" && a.pnrCoverage === "switch") return "Switch coverage requires scram switches on bad matchups.";
    }
    if (stepId === "closeouts") {
      if (value === "aggressive" && a.pnrCoverage === "drop" && a.helpTiming === "late") return "Drop + late help: keep closeouts controlled to protect the drive.";
    }
    if (stepId === "transitionSafety") {
      if (value === "fullCrash" && a.transitionStopBall === "protectRim") return "Protect rim first requires defined safeties; cannot full-crash transition.";
      if (value === "oneBack" && a.reboundBalance === "crash") return "One safety cannot support a 4–5 player crash system.";
    }
    if (stepId === "transitionStopBall") {
      if (value === "protectRim" && a.transitionSafety === "fullCrash") return "Rim protection first needs at least one dedicated safety back.";
      if (value === "earlyStop" && a.transitionSafety === "fullCrash") return "Full crash transition weakens early ball pressure structure.";
    }
    if (stepId === "reboundBalance") {
      if (value === "crash" && a.transitionSafety === "oneBack") return "With one safety, you cannot send 4–5 to the glass reliably.";
      if (value === "crash" && a.transitionSafety === "fullCrash" && a.transitionStopBall !== "contain") return "Full crash transition needs contain stop-ball to pair with an ORB crash.";
      if (value === "safetyFirst" && a.transitionSafety === "fullCrash") return "Safety-first rebounding conflicts with full transition crash.";
    }
    if (stepId === "earlyScreen") {
      if (value === "softShow" && !hasHelpState(a)) return "No half-court help shell: cannot soft show (tag-free hedge).";
      if (value === "softShow" && a.helpTiming === "late" && a.priority !== "disrupt") return "Soft show before the shell needs disrupt identity or early tags.";
      if (value === "noCoverage" && a.priority === "three") return "Protect-three identity cannot concede every early drag with zero coverage.";
    }
    return null;
  };

  LogicEngine.prototype.isOptionAllowed = function (stepId, value) {
    return this.optionDisabledReason(stepId, value) === null;
  };

  LogicEngine.prototype.validateFullSystem = function () {
    var a = state.answers;
    var errors = [];
    var stepOrder = STEPS.map(function (s) { return s.id; });
    for (var i = 0; i < stepOrder.length; i++) {
      var id = stepOrder[i];
      var v = a[id];
      if (!v) { errors.push("Incomplete: " + id); continue; }
      var eng = this;
      if (eng.optionDisabledReason(id, v)) errors.push(eng.optionDisabledReason(id, v));
    }
    if (a.helpStructure === "none" && a.postDefense === "double") errors.push("No help + double post is impossible.");
    if (a.helpStructure === "strong" && a.pnrCoverage === "switch") errors.push("Strong-side help + switch coverage is blocked.");
    if (a.rotationModel === "peel" && a.penetration !== "peel") errors.push("Peel system requires peel penetration.");
    if (a.penetration === "peel" && a.rotationModel !== "peel") errors.push("Peel penetration requires peel rotation model.");
    if (a.rotationModel === "rotate" && a.penetration === "peel") errors.push("Heavy rotations + peel rules are incompatible.");
    if (a.rotationModel === "recover" && a.penetration === "peel") errors.push("Recover base + peel penetration is incoherent.");
    if (a.pnrCoverage === "switch" && a.helpTiming !== "late") errors.push("Switch forces late help.");
    if (a.pnrCoverage === "switch" && a.mismatch !== "scram") errors.push("Switch requires scram mismatch rules.");
    if (a.helpStructure === "none" && ["recover", "rotate", "peel"].indexOf(a.rotationModel) >= 0) errors.push("No help forces switch-based second-line play.");
    if (a.postDefense === "double" && a.helpStructure === "none") errors.push("Double post requires help.");
    if (a.transitionStopBall === "protectRim" && a.transitionSafety === "fullCrash") errors.push("Protect rim first requires a safety back.");
    if (a.reboundBalance === "crash" && a.transitionSafety === "oneBack") errors.push("One safety limits offensive rebound crash count.");
    if (a.reboundBalance === "crash" && a.transitionSafety === "fullCrash" && a.transitionStopBall !== "contain") errors.push("Full crash transition + ORB crash needs contain stop-ball or two-back.");
    if (a.reboundBalance === "safetyFirst" && a.transitionSafety === "fullCrash") errors.push("Safety rebounding conflicts with full crash transition.");
    if ((a.pnrCoverage === "blitz" || a.pnrCoverage === "hedge") && !hasHelpState(a)) errors.push("Hedge/blitz with no help shell is invalid.");
    if (a.pnrCoverage === "blitz" && !blitzAllowed(a)) errors.push("Blitz without early help tags or disrupt identity is invalid.");
    if (a.pnrCoverage === "hedge" && hasHelpState(a) && !(a.helpTiming === "early" || a.priority === "disrupt")) errors.push("Hedge/show without early tags or disrupt identity is invalid.");
    if (a.pnrCoverage === "drop" && a.helpTiming === "early") errors.push("Drop coverage requires late help.");
    if (a.earlyScreen === "softShow" && a.helpStructure === "none") errors.push("Early soft show without help structure is invalid.");
    if (a.earlyScreen === "noCoverage" && a.priority === "three") errors.push("Protect-three plan cannot default to zero early coverage.");
    if (a.rotationModel === "peel" && a.helpTiming === "early") errors.push("Peel model with early help is invalid.");
    if (a.closeouts === "aggressive" && a.pnrCoverage === "drop" && a.helpTiming === "late") errors.push("Drop + late help requires controlled closeouts.");
    if (a.pnrCoverage === "drop" && a.rotationModel === "rotate") errors.push("Drop coverage is incompatible with a full rotate system.");
    var seen = {};
    errors = errors.filter(function (e) {
      if (seen[e]) return false;
      seen[e] = true;
      return true;
    });
    return errors;
  };

  var engine = new LogicEngine();

  function labelFor(stepId, value) {
    var step = STEPS.find(function (s) { return s.id === stepId; });
    if (!step) return value;
    var o = step.options.find(function (x) { return x.value === value; });
    return o ? o.label : value;
  }

  function buildSystemName(a) {
    var parts = [];
    if (a.pnrCoverage === "drop") parts.push("Contain Drop");
    else if (a.pnrCoverage === "switch") parts.push("Switch");
    else if (a.pnrCoverage === "blitz") parts.push("Pressure");
    else if (a.pnrCoverage === "hedge") parts.push("Show");
    if (a.rotationModel === "peel") parts.push("Peel");
    else if (a.rotationModel === "rotate") parts.push("Rotation");
    else if (a.rotationModel === "recover") parts.push("Recover");
    else if (a.rotationModel === "switch") parts.push("Switch");
    if (a.helpStructure === "weak") parts.push("Weak Help");
    else if (a.helpStructure === "strong") parts.push("Loaded");
    else if (a.helpStructure === "mixed") parts.push("Mixed Shell");
    else parts.push("Stay Home");
    return parts.filter(Boolean).join(" + ") + " System";
  }

  function buildReport() {
    var a = state.answers;
    var name = buildSystemName(a);
    var identity = "";
    if (a.priority === "rim") identity = "Shrink the floor and contest at the rim first. ";
    else if (a.priority === "three") identity = "Prioritize three-point contests and nail help. ";
    else identity = "Pressure the ball and force non-rhythm offense. ";
    if (a.driveDirection === "noMiddle") identity += "Drivers are walled to the sideline/baseline.";
    else identity += "Drivers are invited middle with packed paint help.";

    var core = [];
    core.push("Help: " + labelFor("helpStructure", a.helpStructure) + " — " + labelFor("helpTiming", a.helpTiming) + ".");
    core.push("Rotations: " + labelFor("rotationModel", a.rotationModel) + "; penetration = " + labelFor("penetration", a.penetration) + ".");
    core.push("PnR: " + labelFor("pnrCoverage", a.pnrCoverage) + "; closeouts " + labelFor("closeouts", a.closeouts) + ".");
    core.push("Post: " + labelFor("postDefense", a.postDefense) + "; mismatches " + labelFor("mismatch", a.mismatch) + ".");
    core.push("Transition shell: " + labelFor("transitionSafety", a.transitionSafety) + "; stop ball = " + labelFor("transitionStopBall", a.transitionStopBall) + ".");

    var transWho = "";
    if (a.transitionSafety === "oneBack") transWho = "One designated safety sprints widest lane to rim line; others release on shot vs crash rules.";
    else if (a.transitionSafety === "twoBack") transWho = "Two safeties: first guard back takes ball-handler level; second protects rim / weak-side.";
    else transWho = "Full crash release: convert only on long rebounds or scripted safety tags.";

    var transBall = "";
    if (a.transitionStopBall === "earlyStop") transBall = "Pick up early; stunt at halfcourt; force side dead zones.";
    else if (a.transitionStopBall === "contain") transBall = "Channel to help; no gambling until paint is filled.";
    else transBall = "Sprint to pack line; protect rim first, contest threes on late close.";

    var reb = "";
    if (a.reboundBalance === "crash") reb = "Send four to five to glass when safety rules allow; accept risk if contain stop-ball or two-back is live.";
    else if (a.reboundBalance === "balanced") reb = "Two to three crashers with defined long-side tagger and safety release.";
    else reb = "One to two never crash; offensive boards come from slips and long bounces only.";

    var early = "";
    if (a.earlyScreen === "switch") early = "Switch early drags; late scram if mismatch is untenable.";
    else if (a.earlyScreen === "contain") early = "Flat contain; no hedge until shell is set.";
    else if (a.earlyScreen === "softShow") early = "Brief touch with early tag support; recover to roller quickly.";
    else early = "Through/under to protect paint; live with pull-up variance vs elite shooters only if identity allows.";

    var strengths = [];
    var weaknesses = [];
    var uses = [];

    if (a.priority === "three" && a.closeouts === "aggressive") strengths.push("Runs shooters off the line in scramble situations.");
    if (a.pnrCoverage === "drop" && a.helpTiming === "late") strengths.push("Low foul rate; controlled pick-and-roll defense.");
    if (a.pnrCoverage === "blitz") strengths.push("Forces young guards into late-clock decisions.");
    if (a.rotationModel === "switch") strengths.push("Simplifies communication vs spread pick-and-roll.");
    if (a.transitionSafety === "twoBack") strengths.push("Consistent transition floor vs running teams.");
    if (strengths.length === 0) strengths.push("Balanced risk profile when rules are executed with discipline.");

    if (a.helpStructure === "none") weaknesses.push("Isolated breakdowns vs elite shot creators.");
    if (a.pnrCoverage === "drop") weaknesses.push("Elite pull-up shooters can turn the corner for rhythm threes.");
    if (a.rotationModel === "rotate") weaknesses.push("One late rotation exposes corner skips.");
    if (a.transitionSafety === "fullCrash") weaknesses.push("Long misses become automatic run-outs.");
    if (a.postDefense === "onev1") weaknesses.push("Deep post catches vs size without automatic doubles.");
    if (weaknesses.length < 2) weaknesses.push("Scouting can attack the gap between your transition rules and ORB release.");

    if (a.priority === "three") uses.push("vs high-volume three-point teams: nail tags and closeout rules are your edge.");
    if (a.driveDirection === "noMiddle") uses.push("vs middle-drive finishers: baseline pushes shrink efficiency.");
    if (a.transitionStopBall === "earlyStop") uses.push("vs transition-heavy teams: slow the ball and force half-court.");
    if (a.postDefense === "double") uses.push("vs dominant post scorers: force passes to non-shooters.");
    if (uses.length < 3) uses.push("vs balanced offenses: clarity and repeatability beat complexity.");

    return {
      name: name,
      identity: identity,
      core: core,
      transition: { who: transWho, ball: transBall },
      rebound: reb,
      early: early,
      strengths: strengths,
      weaknesses: weaknesses,
      uses: uses
    };
  }

  function el(tag, props, children) {
    var node = document.createElement(tag);
    if (props) for (var k in props) {
      if (k === "className") node.className = props[k];
      else if (k === "text") node.textContent = props[k];
      else if (k.slice(0, 2) === "on" && typeof props[k] === "function") node.addEventListener(k.slice(2).toLowerCase(), props[k]);
      else node.setAttribute(k, props[k]);
    }
    (children || []).forEach(function (c) {
      if (typeof c === "string") node.appendChild(document.createTextNode(c));
      else if (c) node.appendChild(c);
    });
    return node;
  }

  function render() {
    var root = document.getElementById("app");
    root.innerHTML = "";
    var total = STEPS.length;
    var idx = state.stepIndex;
    var done = idx >= total;
    var pct = done ? 100 : Math.round(((idx + 1) / total) * 100);

    var header = el("header", {}, [
      el("h1", { text: "Defensive System Builder" }),
      el("div", { className: "sub", text: "ELITE · HALF COURT · TRANSITION · ORB · EARLY" })
    ]);

    var prog = el("div", { className: "progress-wrap" }, [
      el("div", { className: "progress-meta" }, [
        el("span", { text: done ? "Complete" : ("Step " + (idx + 1) + " / " + total) }),
        el("span", { text: pct + "%" })
      ]),
      el("div", { className: "progress-bar" }, [
        el("div", { className: "progress-fill", style: "width:" + pct + "%" })
      ])
    ]);

    if (idx >= total) {
      var errs = engine.validateFullSystem();
      var main = el("main", {});
      if (errs.length) {
        main.appendChild(el("div", { className: "block-banner", text: "System blocked: " + errs[0] }));
        main.appendChild(el("p", { className: "screen-hint", text: "Use Back to adjust choices until the engine clears all conflicts." }));
      } else {
        var r = buildReport();
        main.appendChild(el("div", { className: "system-name", text: r.name }));
        main.appendChild(el("div", { className: "report" }, [
          el("h2", { text: "Identity" }),
          el("p", { text: r.identity }),
          el("h3", { text: "Core rules" }),
          el("ul", {}, r.core.map(function (t) { return el("li", { text: t }); })),
          el("h3", { text: "Transition plan" }),
          el("p", { text: r.transition.who }),
          el("p", { text: r.transition.ball }),
          el("h3", { text: "Rebound plan" }),
          el("p", { text: r.rebound }),
          el("h3", { text: "Early offense defense" }),
          el("p", { text: r.early }),
          el("h3", { text: "Strengths" }),
          el("ul", {}, r.strengths.map(function (t) { return el("li", { text: t }); })),
          el("h3", { text: "Weaknesses" }),
          el("ul", {}, r.weaknesses.map(function (t) { return el("li", { text: t }); })),
          el("h3", { text: "Ideal use cases" }),
          el("ul", {}, r.uses.map(function (t) { return el("li", { text: t }); }))
        ]));
      }
      var nav = el("div", { className: "nav-row" }, [
        el("button", { className: "btn-ghost", text: "Back", disabled: state.history.length === 0, onclick: goBack }),
        el("button", { className: "btn-danger", text: "Restart", onclick: restart })
      ]);
      root.appendChild(header);
      root.appendChild(prog);
      root.appendChild(main);
      root.appendChild(nav);
      return;
    }

    var step = STEPS[idx];
    var main = el("main", {}, [
      el("div", { className: "screen-title", text: step.label }),
      el("div", { className: "screen-hint", text: step.hint })
    ]);

    var opts = el("div", { className: "options" });
    step.options.forEach(function (opt) {
      var reason = engine.optionDisabledReason(step.id, opt.value);
      var row = el("button", {
        type: "button",
        className: "btn-option",
        disabled: !!reason,
        onclick: function () { selectOption(step.id, opt.value); }
      }, []);
      var left = el("div", {}, []);
      left.appendChild(el("div", {}, [document.createTextNode(opt.label)]));
      if (opt.desc) left.appendChild(el("span", { className: "desc", text: opt.desc }));
      row.appendChild(left);
      if (reason) left.appendChild(el("div", { className: "reason", text: reason }));
      opts.appendChild(row);
    });
    main.appendChild(opts);

    var nav = el("div", { className: "nav-row" }, [
      el("button", { className: "btn-ghost", text: "Back", disabled: state.history.length === 0, onclick: goBack }),
      el("button", { className: "btn-danger", text: "Restart", onclick: restart })
    ]);

    root.appendChild(header);
    root.appendChild(prog);
    root.appendChild(main);
    root.appendChild(nav);
  }

  function selectOption(stepId, value) {
    state.history.push({ stepIndex: state.stepIndex, answers: JSON.parse(JSON.stringify(state.answers)) });
    state.answers[stepId] = value;
    state.stepIndex++;
    if (state.stepIndex > STEPS.length) state.stepIndex = STEPS.length;
    render();
  }

  function goBack() {
    if (!state.history.length) return;
    var snap = state.history.pop();
    state.stepIndex = snap.stepIndex;
    state.answers = snap.answers;
    render();
  }

  function restart() {
    state.answers = {};
    state.stepIndex = 0;
    state.history = [];
    state.blockedReason = null;
    render();
  }

  render();
})();
</script>
</body>
</html>
